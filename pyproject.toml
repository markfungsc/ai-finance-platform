[tool.ruff]
target-version = "py311"
line-length = 88
src = ["src"]

[tool.ruff.lint]
extend-select = ["I"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.ruff.lint.per-file-ignores]
# sys.path bootstrap for Streamlit Community Cloud must run before `from ui...` imports.
"src/ui/streamlit_app.py" = ["E402"]