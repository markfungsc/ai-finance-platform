services:
  postgres:
    image: postgres:18
    container_name: finance_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_finance
    # Postgres 18+ images expect a single named volume on /var/lib/postgresql (not .../data).
    # See https://github.com/docker-library/postgres/pull/1259
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_finance"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: finance_api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_finance
      MODEL_PATH: /app/models/swing-trade/random_forest_pooled.pkl
      FEATURE_COLUMNS_PATH: /app/models/swing-trade/random_forest_pooled_feature_columns.pkl
      SP500_SYMBOLS_FILE: /app/data/universe/sp500_symbols.txt
      QDRANT_URL: http://qdrant:6333
      QDRANT_NEWS_COLLECTION: news_chunks_v1
    volumes:
      - ../models:/app/models:ro
      - ../experiments:/app/experiments:ro
      - ../data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    container_name: finance_ui
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://api:8000
      INFERENCE_API_BASE_URL: http://api:8000
    volumes:
      - ../experiments:/app/experiments:ro
    depends_on:
      api:
        condition: service_healthy

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: finance_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data:
